name: asplayer
description: ASplayer — keep your own songs, listen offline.
publish_to: "none"
version: 1.0.9+17

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # playback + background service
  just_audio: ^0.9.42
  # Windows playback backend for just_audio (mobile/mac use the default one).
  just_audio_windows: ^0.2.3
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # files, tags, storage
  path_provider: ^2.1.4
  path: ^1.9.0
  file_picker: ^11.0.0
  audio_metadata_reader: ^1.6.0
  # 1.9.x builds against compileSdk 37, which Flutter's Android toolchain
  # does not ship yet. Pinned until the toolchain catches up.
  receive_sharing_intent: '>=1.8.0 <1.9.0'
  shared_preferences: ^2.3.2

  # about screen
  url_launcher: ^6.3.0

  # share the audio file out to other apps (Telegram, etc.)
  share_plus: ^10.1.4

  # party queue: a tiny local web server on the host + a QR for guests to join
  shelf: ^1.4.1
  qr_flutter: ^4.1.0
  # pull a dominant colour out of each cover to tint the player screen
  palette_generator: ^0.3.3+7

  # state
  provider: ^6.1.2

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # The font files are also declared as plain assets so the party web server can
  # read their bytes with rootBundle.load and serve them to guests — the guest
  # page renders in the app's own Vazirmatn / Unbounded even with no internet.
  assets:
    - assets/fonts/Vazirmatn.ttf
    - assets/fonts/Unbounded.ttf

  fonts:
    # Covers Persian and Latin in one family — the whole app's text.
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn.ttf
    # Display face, used only for the ASplayer wordmark.
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded.ttf
