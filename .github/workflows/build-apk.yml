name: بیلد و انتشار

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest

    # سکرت‌ها را نمی‌شود مستقیم در `if` بررسی کرد، پس اول به env می‌آیند.
    env:
      KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: گرفتن بسته‌ها
        run: flutter pub get

      - name: بررسی کد
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      # اگر سکرت‌ها تنظیم نشده باشند، بیلد با کلید اشکال‌زدایی ادامه می‌دهد
      # و هشدار می‌دهد که این خروجی قابل انتشار نیست.
      - name: بازگشایی کلید امضا
        id: keystore
        if: env.KEYSTORE_BASE64 != ''
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"

      - name: هشدار اگر امضا واقعی نبود
        if: env.KEYSTORE_BASE64 == ''
        run: echo "::warning::سکرت‌های امضا تنظیم نشده‌اند. خروجی با کلید اشکال‌زدایی امضا می‌شود و قابل انتشار نیست."

      - name: بیلد فایل نصبی
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee build.log

      # لاگ کامل بدون توکن قابل دانلود نیست، ولی حاشیه‌نویسی‌ها هستند.
      # پس متن خطا را به‌صورت حاشیه‌نویسی بیرون می‌دهیم.
      - name: بیرون دادن متن خطا
        if: failure()
        run: |
          msg=$(tail -n 60 build.log \
            | sed -e 's/%/%25/g' -e 's/\r//g' \
            | awk '{ printf "%s%%0A", $0 }')
          echo "::error title=خطای بیلد::${msg}"

      # بسته‌ی گوگل‌پلی. فقط وقتی کلید واقعی داریم معنا دارد.
      - name: بیلد بسته‌ی گوگل‌پلی
        if: env.KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
        run: flutter build appbundle --release

      - name: آپلود فایل نصبی
        uses: actions/upload-artifact@v4
        with:
          name: asplayer-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: آپلود بسته‌ی گوگل‌پلی
        if: env.KEYSTORE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: asplayer-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
